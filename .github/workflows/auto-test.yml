name: Auto Test

on:
  # MANUAL TRIGGER
  workflow_dispatch:
  push:
    # ALLOWS YOUR BRANCH TO RUN
    branches: [ master, 1.23.X, test-ci-systemd-fix ]
  pull_request:
    branches: [ master, 1.23.X ]

jobs:
  auto-test:
    # Removed 'needs' so it starts NOW
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      matrix:
        # Removed ARM64 to prevent waiting
        os: [macos-latest, ubuntu-22.04, windows-latest]
        node: [ 20, 24 ]
        include:
          - os: ubuntu-22.04
            node: 25

    steps:
    - run: git config --global core.autocrlf false
    - uses: actions/checkout@v4

    - name: Detect systemd monitor changes
      id: systemd-files
      uses: dorny/paths-filter@v3
      with:
        filters: |
          systemd:
            - 'server/monitor-types/system-service.js'
            - 'test/backend-test/test-system-service.js'
            - '.github/workflows/auto-test.yml'

    - name: Cache/Restore node_modules
      uses: actions/cache@v4
      id: node-modules-cache
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

    # === STANDARD PATH ===
    - name: Use Node.js ${{ matrix.node }}
      if: runner.os != 'Linux' || steps.systemd-files.outputs.systemd != 'true'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node }}

    - run: npm install
      if: runner.os != 'Linux' || steps.systemd-files.outputs.systemd != 'true'
    - run: npm run build
      if: runner.os != 'Linux' || steps.systemd-files.outputs.systemd != 'true'
    - run: npm run test-backend
      if: runner.os != 'Linux' || steps.systemd-files.outputs.systemd != 'true'
      env:
        HEADLESS_TEST: 1
        JUST_FOR_TEST: ${{ secrets.JUST_FOR_TEST }}

    # === SYSTEMD PATH (Linux Only) ===
    - name: Build Systemd Docker Image (with Node.js baked in)
      if: runner.os == 'Linux' && steps.systemd-files.outputs.systemd == 'true'
      run: |
        cat <<EOF > Dockerfile.systemd
        FROM ubuntu:22.04
        ENV DEBIAN_FRONTEND=noninteractive
        
        RUN apt-get update && \
            apt-get install -y systemd systemd-sysv dbus curl gnupg build-essential python3 make g++ ca-certificates
            
        # Install Node.js 20 explicitly
        RUN mkdir -p /etc/apt/keyrings && \
            curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg && \
            echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" | tee /etc/apt/sources.list.d/nodesource.list && \
            apt-get update && \
            apt-get install -y nodejs && \
            npm -v
            
        CMD ["/sbin/init"]
        EOF
        
        docker build -t kuma-systemd-image -f Dockerfile.systemd .

    - name: Start systemd container
      if: runner.os == 'Linux' && steps.systemd-files.outputs.systemd == 'true'
      run: |
        docker rm -f kuma-systemd 2>/dev/null || true
        
        # Start with all fixes: Cgroup Host + Permissive Security + Docker Env
        docker run --privileged --detach --name kuma-systemd \
          --env container=docker \
          --cgroupns=host \
          --security-opt seccomp=unconfined \
          --security-opt apparmor=unconfined \
          --tmpfs /run --tmpfs /run/lock \
          -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
          -v "$PWD":/workspace \
          -w /workspace \
          kuma-systemd-image
          
        echo "⏳ Waiting 5 seconds for boot..."
        sleep 5
        
        if [ "$(docker inspect -f '{{.State.Running}}' kuma-systemd)" != "true" ]; then
            docker logs kuma-systemd
            exit 1
        fi

    - name: Backend tests with systemd
      if: runner.os == 'Linux' && steps.systemd-files.outputs.systemd == 'true'
      env:
        HEADLESS_TEST: 1
        JUST_FOR_TEST: ${{ secrets.JUST_FOR_TEST }}
      run: |
        docker exec kuma-systemd npm install
        docker exec kuma-systemd npm run build
        
        echo "🧪 Running ONLY the System Service test..."
        # We run strictly the one file we care about using Node's native runner
        docker exec -e HEADLESS_TEST=1 kuma-systemd node --test test/backend-test/test-system-service.js

    - name: Cleanup systemd container
      if: ${{ always() && runner.os == 'Linux' && steps.systemd-files.outputs.systemd == 'true' }}
      run: |
        docker rm -f kuma-systemd
        rm -f Dockerfile.systemd

  # Simplified checks for Shadow Test
  check-linters:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v6
      with:
        node-version: 20
    - run: npm install
    - run: npm run lint:prod

  e2e-test:
    needs: [ check-linters ]
    runs-on: ubuntu-22.04
    env:
      PLAYWRIGHT_VERSION: ~1.39.0
    steps:
    - run: git config --global core.autocrlf false
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v6
      with:
        node-version: 22
    - run: npm install
    - run: npx playwright@${{ env.PLAYWRIGHT_VERSION }} install
    - run: npm run build
    - run: npm run test-e2e